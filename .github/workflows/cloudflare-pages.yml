name: Build and deploy web

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.35.7"

jobs:
  build:
    name: Build Flutter web
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Run tests
        run: flutter test

      - name: Build web release
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          AUTH_REDIRECT_URL: ${{ vars.AUTH_REDIRECT_URL }}
          PUBLIC_APP_URL: ${{ vars.PUBLIC_APP_URL }}
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
        run: |
          public_app_url="$PUBLIC_APP_URL"
          if [ -z "$public_app_url" ] && [ -n "$CLOUDFLARE_PAGES_PROJECT_NAME" ]; then
            public_app_url="https://${CLOUDFLARE_PAGES_PROJECT_NAME}.pages.dev"
          fi

          if [ -n "$SUPABASE_URL" ] && [ -n "$SUPABASE_ANON_KEY" ]; then
            build_args=(
              --release
              --dart-define=SUPABASE_URL="$SUPABASE_URL"
              --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY"
            )
            if [ -n "$AUTH_REDIRECT_URL" ]; then
              build_args+=(--dart-define=AUTH_REDIRECT_URL="$AUTH_REDIRECT_URL")
            fi
            if [ -n "$public_app_url" ]; then
              build_args+=(--dart-define=PUBLIC_APP_URL="$public_app_url")
            fi
            flutter build web "${build_args[@]}"
          else
            echo "SUPABASE_URL or SUPABASE_ANON_KEY is missing; building local demo mode."
            if [ -n "$public_app_url" ]; then
              flutter build web --release --dart-define=PUBLIC_APP_URL="$public_app_url"
            else
              flutter build web --release
            fi
          fi

      - name: Prepare Cloudflare Pages artifact
        run: bash scripts/prepare_cloudflare_pages.sh

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-web
          path: build/web
          if-no-files-found: error

  deploy-test:
    name: Deploy test version to Cloudflare Pages
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' && vars.CLOUDFLARE_PAGES_PROJECT_NAME != '' }}

    steps:
      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: flutter-web
          path: build/web

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build/web --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }} --branch=${{ github.ref_name }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
