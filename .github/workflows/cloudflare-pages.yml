name: Build and deploy web

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.35.7"

jobs:
  build:
    name: Build Flutter web
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Run tests
        run: flutter test

      - name: Validate production remote configuration
        if: ${{ github.ref == 'refs/heads/main' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          missing=0
          if [ -z "$SUPABASE_URL" ]; then
            echo "::error title=Missing Supabase URL::Set SUPABASE_URL as a GitHub Actions repository secret."
            missing=1
          fi
          if [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error title=Missing Supabase anon key::Set SUPABASE_ANON_KEY as a GitHub Actions repository secret."
            missing=1
          fi
          if [ -z "$CLOUDFLARE_PAGES_PROJECT_NAME" ]; then
            echo "::error title=Missing Cloudflare Pages project::Set CLOUDFLARE_PAGES_PROJECT_NAME as a GitHub repository variable."
            missing=1
          fi
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error title=Missing Cloudflare API token::Set CLOUDFLARE_API_TOKEN as a GitHub Actions secret."
            missing=1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error title=Missing Cloudflare account ID::Set CLOUDFLARE_ACCOUNT_ID as a GitHub Actions secret."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          if [ "${SUPABASE_URL#http://}" = "$SUPABASE_URL" ] && [ "${SUPABASE_URL#https://}" = "$SUPABASE_URL" ]; then
            echo "::error title=Invalid Supabase URL::SUPABASE_URL must start with http:// or https://."
            exit 1
          fi
          echo "Production remote configuration is present."

      - name: Build web release
        env:
          AUTH_REDIRECT_URL: ${{ vars.AUTH_REDIRECT_URL }}
          PUBLIC_APP_URL: ${{ vars.PUBLIC_APP_URL }}
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
        run: |
          if [ -z "$CLOUDFLARE_PAGES_PROJECT_NAME" ]; then
            echo "CLOUDFLARE_PAGES_PROJECT_NAME is missing."
            exit 1
          fi

          public_app_url="$PUBLIC_APP_URL"
          if [ -z "$public_app_url" ] && [ -n "$CLOUDFLARE_PAGES_PROJECT_NAME" ]; then
            public_app_url="https://${CLOUDFLARE_PAGES_PROJECT_NAME}.pages.dev"
          fi

          flutter build web \
            --release \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=AUTH_REDIRECT_URL="$AUTH_REDIRECT_URL" \
            --dart-define=PUBLIC_APP_URL="$public_app_url"

      - name: Prepare Cloudflare Pages artifact
        run: bash scripts/prepare_cloudflare_pages.sh

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-web
          path: build/web
          if-no-files-found: error

  deploy-test:
    name: Deploy test version to Cloudflare Pages
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' && vars.CLOUDFLARE_PAGES_PROJECT_NAME != '' }}

    steps:
      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: flutter-web
          path: build/web

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build/web --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }} --branch=${{ github.ref_name }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
